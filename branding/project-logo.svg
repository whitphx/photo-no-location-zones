<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200" role="img" aria-labelledby="title desc">
  <title id="title">Photo No-Location Zones</title>
  <desc id="desc">Project logo: app icon mark on the left, wordmark "Photo No-Location Zones" with tagline "Geofenced GPS scrubber for Android" on the right.</desc>

  <!-- Mark -->
  <g transform="translate(20, 20) scale(0.3333)">
    <rect width="480" height="480" rx="108" fill="#0F2A47"/>
    <g stroke="#7DD3FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 80,120 L 80,80 L 120,80"/>
      <path d="M 360,80 L 400,80 L 400,120"/>
      <path d="M 80,360 L 80,400 L 120,400"/>
      <path d="M 360,400 L 400,400 L 400,360"/>
    </g>
    <circle cx="240" cy="240" r="145"
            fill="#7DD3FC" fill-opacity="0.14"
            stroke="#7DD3FC" stroke-width="8"
            stroke-dasharray="20 13" stroke-linecap="round"/>
    <path d="M 240,140 C 273,140 300,167 300,200 C 300,240 240,320 240,320 C 240,320 180,240 180,200 C 180,167 207,140 240,140 Z"
          fill="#FFFFFF"/>
    <circle cx="240" cy="200" r="25" fill="#0F2A47"/>
    <line x1="170" y1="270" x2="310" y2="130"
          stroke="#0F2A47" stroke-width="28" stroke-linecap="round"/>
    <line x1="170" y1="270" x2="310" y2="130"
          stroke="#FF5252" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="208" y="98"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="500"
        fill="#0F2A47" letter-spacing="-0.32">Photo No-Location Zones</text>

  <!-- Tagline -->
  <text x="208" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400"
        fill="#476582">Geofenced GPS scrubber for Android</text>
</svg>
